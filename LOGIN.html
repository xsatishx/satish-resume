<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Materialize - Compiled and minified CSS-->
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/materialize/0.95.3/css/materialize.min.css" />
    <!-- Font Awesome Icon - CSS-->
    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css" />

    <title>Login - Satish Balakrishnan</title>

    <style>
        body {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Roboto', sans-serif;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

            .login-header h4 {
                color: #00695c;
                font-weight: 500;
                margin: 0 0 10px 0;
            }

            .login-header p {
                color: #757575;
                margin: 0;
                font-size: 14px;
            }

        .logo-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 3px solid #00695c;
        }

            .logo-circle img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .input-field {
            margin-bottom: 20px;
            position: relative;
        }

            .input-field input[type="text"],
            .input-field input[type="password"],
            .input-field input[type="email"] {
                border: 1px solid #e0e0e0;
                border-radius: 5px;
                padding: 12px 15px 12px 45px;
                width: 100%;
                box-sizing: border-box;
                font-size: 14px;
                transition: all 0.3s ease;
            }

            .input-field input:focus {
                border-color: #00695c;
                outline: none;
                box-shadow: 0 0 0 2px rgba(0, 105, 92, 0.1);
            }

            .input-field i {
                position: absolute;
                left: 15px;
                top: 50%;
                transform: translateY(-50%);
                color: #00695c;
                font-size: 18px;
            }

        .btn-login {
            background: #00695c;
            width: 100%;
            border-radius: 5px;
            padding: 12px;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

            .btn-login:hover {
                background: #004d40;
                box-shadow: 0 4px 12px rgba(0, 105, 92, 0.3);
            }

        .checkbox-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            font-size: 14px;
        }

            .checkbox-container label {
                display: flex;
                align-items: center;
                color: #757575;
                cursor: pointer;
            }

            .checkbox-container input[type="checkbox"] {
                margin-right: 8px;
            }

        .forgot-password {
            color: #00695c;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

            .forgot-password:hover {
                color: #004d40;
            }

        .divider-container {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider-text {
            padding: 0 15px;
            color: #9e9e9e;
            font-size: 13px;
        }

        .social-login {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

            .social-btn:hover {
                background: #f5f5f5;
                border-color: #00695c;
            }

            .social-btn i {
                font-size: 18px;
            }

        .signup-text {
            text-align: center;
            margin-top: 20px;
            color: #757575;
            font-size: 14px;
        }

            .signup-text a {
                color: #00695c;
                text-decoration: none;
                font-weight: 500;
            }

                .signup-text a:hover {
                    text-decoration: underline;
                }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

            .back-home a {
                color: white;
                text-decoration: none;
                font-size: 14px;
                display: inline-flex;
                align-items: center;
                gap: 5px;
                transition: opacity 0.3s ease;
            }

                .back-home a:hover {
                    opacity: 0.8;
                }

        @media (max-width: 600px) {
            .login-card {
                padding: 30px 20px;
            }

            .social-login {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle">
                    <img src="assets/img/passport-new.jpg" alt="Profile Picture">
                </div>
                <h4>Welcome Back</h4>
                <p>Please login to continue</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-field">
                    <i class="fa fa-user"></i>
                    <input type="email" id="email" name="email" placeholder="Email Address" required>
                </div>

                <div class="input-field">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>

                <div class="checkbox-container">
                    <label>
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="divider-container">
                <div class="divider-line"></div>
                <div class="divider-text">OR</div>
                <div class="divider-line"></div>
            </div>

            <div class="social-login">
                <button class="social-btn" onclick="socialLogin('github')">
                    <i class="fa fa-github"></i>
                    <span>GitHub</span>
                </button>
                <button class="social-btn" onclick="socialLogin('linkedin')">
                    <i class="fa fa-linkedin"></i>
                    <span>LinkedIn</span>
                </button>
            </div>

            <div class="signup-text">
                Don't have an account? <a href="#">Sign up here</a>
            </div>
        </div>
    </div>

    <div class="back-home">
        <a href="index.html">
            <i class="fa fa-arrow-left"></i>
            Back to Home
        </a>
    </div>

    <script>function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      // Add your authentication logic here
      console.log('Login attempt:', { email, password, remember });

      // Example: Redirect after successful login
      alert('Login functionality needs to be connected to your backend authentication system.');
      // window.location.href = 'index.html';
    }

    function socialLogin(provider) {
      console.log('Social login with:', provider);
      alert(`${provider} login needs to be configured with OAuth.`);
      // Add OAuth integration logic here
    }

    // Add enter key support
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('loginForm');
      form.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          form.dispatchEvent(new Event('submit'));
        }
      });
    });</script>
</body>

</html>
